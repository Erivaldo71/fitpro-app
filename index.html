<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPro — Treino em Casa</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0f;--bg2:#161618;--bg3:#1e1e21;--bg4:#28282d;
  --accent:#f97316;--accent2:#fb923c;--accentd:#c2410c;
  --text:#f5f5f5;--text2:#a1a1aa;--text3:#52525b;
  --green:#22c55e;--blue:#3b82f6;--purple:#a855f7;--red:#ef4444;--yellow:#eab308;
  --border:#252528;
  --font-h:'Barlow Condensed',sans-serif;
  --font:'Barlow',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}
#app{min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;padding-bottom:80px;min-height:100vh}
.screen.active{display:flex}

nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding:8px 0 env(safe-area-inset-bottom,12px)}
nav button{flex:1;background:none;border:none;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--font);font-size:10px;font-weight:500;transition:.15s;padding:4px 0}
nav button.active{color:var(--accent)}
nav button svg{width:21px;height:21px;stroke-width:1.8}

.hdr{background:var(--bg2);padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr h1{font-family:var(--font-h);font-size:22px;font-weight:800;letter-spacing:.5px}
.hdr h1 span{color:var(--accent)}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px}
.card-xs{background:var(--bg3);border-radius:10px;padding:10px 12px}

.xpbar{background:var(--bg3);border-radius:99px;height:8px;overflow:hidden}
.xpfill{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;border-radius:99px;transition:.5s}

.sec{padding:14px 16px 0}
.sec-title{font-family:var(--font-h);font-size:18px;font-weight:700;letter-spacing:.4px;margin-bottom:10px}

.exc{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.12s;margin-bottom:8px}
.exc:active{transform:scale(.98)}
.exc.sel{border-color:var(--accent);background:rgba(249,115,22,.07)}
.eico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.eico.corpo{background:rgba(249,115,22,.15)}
.eico.calis{background:rgba(59,130,246,.15)}
.eico.acad{background:rgba(168,85,247,.15)}

.tag{font-size:10px;font-weight:700;font-family:var(--font-h);letter-spacing:.4px;padding:2px 7px;border-radius:6px}
.tag.corpo{background:rgba(249,115,22,.2);color:var(--accent2)}
.tag.calis{background:rgba(59,130,246,.2);color:#60a5fa}
.tag.acad{background:rgba(168,85,247,.2);color:#c084fc}
.tag.ini{background:rgba(34,197,94,.2);color:#4ade80}
.tag.int{background:rgba(234,179,8,.2);color:#facc15}
.tag.adv{background:rgba(239,68,68,.2);color:#f87171}

.btn{border:none;border-radius:12px;font-family:var(--font);font-weight:600;font-size:15px;cursor:pointer;transition:.12s;padding:13px 20px;width:100%}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:var(--accent2)}
.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-d{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.btn-g{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.btn-sm{font-size:13px;padding:8px 14px;border-radius:10px;width:auto}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-c{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.stat-v{font-family:var(--font-h);font-size:28px;font-weight:800}
.stat-l{font-size:10px;color:var(--text2);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

.ach{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:13px;margin-bottom:8px}
.ach.locked{opacity:.35}

.fbar{display:flex;gap:8px;padding:10px 16px 8px;overflow-x:auto;scrollbar-width:none}
.fbar::-webkit-scrollbar{display:none}
.fchip{border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:500;background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:.12s;flex-shrink:0}
.fchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

.set-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.set-row:last-child{border:none}
.snum{width:26px;height:26px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text2);flex-shrink:0}
.snum.done{background:rgba(34,197,94,.2);color:var(--green)}
.ninput{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;font-weight:600;width:50px;padding:6px 6px;text-align:center;outline:none}
.ninput:focus{border-color:var(--accent)}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.modal-ov.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:18px 18px 36px;width:100%;max-width:430px;transform:translateY(100%);transition:.28s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto}
.modal-ov.open .modal{transform:translateY(0)}
.mhandle{width:38px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 14px}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--bg2);border:1px solid var(--accent);color:var(--text);padding:11px 18px;border-radius:12px;font-weight:600;font-size:13px;z-index:999;transition:.25s;white-space:nowrap;max-width:320px;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}

.lvlbadge{background:linear-gradient(135deg,var(--accent),var(--accentd));border-radius:10px;padding:3px 9px;font-family:var(--font-h);font-size:14px;font-weight:800;letter-spacing:.4px;color:#fff}

/* Rest Timer overlay */
.rest-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;opacity:0;pointer-events:none;transition:.25s}
.rest-ov.open{opacity:1;pointer-events:all}

/* Set countdown pill */
.set-timer-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);border-radius:8px;padding:4px 10px;font-size:13px;font-weight:600;color:#60a5fa;cursor:pointer;transition:.12s}
.set-timer-pill:active{transform:scale(.96)}
.set-timer-pill.running{background:rgba(249,115,22,.15);border-color:rgba(249,115,22,.3);color:var(--accent2)}
.set-timer-pill.done-t{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.3);color:var(--green)}

/* Water tracker */
.water-drop{width:32px;height:32px;cursor:pointer;transition:.12s;display:inline-flex;align-items:center;justify-content:center;font-size:20px;border-radius:8px}
.water-drop:active{transform:scale(.9)}
.water-drop.filled{filter:hue-rotate(0deg)}
.water-drop.empty{opacity:.25}

/* Template card */
.tmpl{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:.12s;margin-bottom:8px}
.tmpl:active{transform:scale(.98);background:var(--bg3)}

/* Progress bar */
.prog-bar{background:var(--bg3);border-radius:99px;height:6px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:99px;transition:.3s}

/* Macro bar */
.mbar{height:10px;border-radius:99px;overflow:hidden;background:var(--bg3);margin-top:5px}
.mfill{height:100%;border-radius:99px}

/* Weight chart */
#weight-canvas{border-radius:10px;overflow:hidden}

@keyframes pop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{stroke-dashoffset:0}}
.pop{animation:pop .35s ease forwards}
.pulse{animation:pulse 1.2s ease infinite}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
</style>
</head>

<div id="app">

<!-- Exercise Modal -->
<div class="modal-ov" id="modal-ex"><div class="modal" role="dialog" aria-modal="true" aria-label="Detalhes do exercício"><div class="mhandle"></div><div id="modal-ex-body"></div></div></div>

<!-- Rest Timer Full-Screen Overlay -->
<div class="rest-ov" id="rest-ov">
  <div style="text-align:center">
    <div style="font-family:var(--font-h);font-size:14px;font-weight:700;letter-spacing:1px;color:var(--text2);text-transform:uppercase;margin-bottom:6px" id="rest-label-top">Descansando</div>

<!-- Set Countdown Full-Screen -->
<div class="rest-ov" id="set-ov" style="background:rgba(0,0,10,.92)">

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// FitPro · Supabase Integration (Premium-Level) - NÃO QUEBRAR NADA
// Fallback: localStorage continua funcionando 100%
// Quando logado: usa finish_workout() RPC seguro + sync de perfil
// ═══════════════════════════════════════════════════════════════

let supabaseClient = null;
let currentUser = null;
let isSupabaseReady = false;

// Configuração Supabase (edite com seus dados reais)
const SUPABASE_URL = 'https://edqufpltcmopqpsyjvhxtx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkcWZ1cGx0Y21vcHFzeWx2aHR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjc1NTUsImV4cCI6MjA5NjYwMzU1NX0.edTVK5mG5dTzSA0IDYZ_4oJ-6yijTVfq3TIbeAY7y0Y';

// Inicializa Supabase (se as chaves forem válidas)
function initSupabase() {
  if (typeof window.supabase === 'undefined' || 
      SUPABASE_URL.includes('SEU-PROJETO') || 
      SUPABASE_ANON_KEY.includes('SEU_ANON_KEY')) {
    console.warn('%c[FitPro] Supabase não configurado. Usando apenas localStorage.', 'color:#eab308');
    return false;
  }
  try {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });
    isSupabaseReady = true;
    console.log('%c[FitPro] Supabase Client inicializado com sucesso ✓', 'color:#22c55e');
    return true;
  } catch (e) {
    console.error('[FitPro] Erro ao inicializar Supabase:', e);
    return false;
  }
}

// Verifica sessão atual
async function checkSupabaseSession() {
  if (!isSupabaseReady || !supabaseClient) return null;
  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session?.user) {
      currentUser = session.user;
      console.log('%c[FitPro] Usuário logado:', 'color:#22c55e', currentUser.email);
      // TODO: Sincronizar perfil do Supabase para o estado local S
      return currentUser;
    }
  } catch (e) {
    console.warn('[FitPro] Erro ao verificar sessão Supabase:', e);
  }
  return null;
}

// Login com Magic Link (melhor UX para mobile)
async function signInWithMagicLink(email) {
  if (!isSupabaseReady || !supabaseClient) {
    toast('⚠️ Supabase não configurado ainda. Usando modo offline.');
    return { ok: false, error: 'not_configured' };
  }
  try {
    const { error } = await supabaseClient.auth.signInWithOtp({
      email: email,
      options: { emailRedirectTo: window.location.origin }
    });
    if (error) throw error;
    toast('📧 Link mágico enviado! Verifique seu e-mail.');
    return { ok: true };
  } catch (err) {
    console.error(err);
    toast('❌ Erro ao enviar link: ' + (err.message || 'Tente novamente'));
    return { ok: false, error: err.message };
  }
}

async function signOutSupabase() {
  if (supabaseClient) {
    await supabaseClient.auth.signOut();
  }
  currentUser = null;
  toast('👋 Desconectado com sucesso.');
  // Opcional: limpar S.auth ou manter progresso local
  renderProfile();
}

// Chamada RPC segura para finish_workout (o coração da segurança)
async function finishWorkoutViaSupabase(workoutId) {
  if (!isSupabaseReady || !supabaseClient || !currentUser) {
    console.log('[FitPro] Usando cálculo local (não logado)');
    return null; // fallback para lógica local
  }
  try {
    const { data, error } = await supabaseClient.rpc('finish_workout', {
      p_workout_id: workoutId
    });
    if (error) throw error;
    console.log('%c[FitPro] finish_workout RPC executado com sucesso', 'color:#22c55e', data);
    return data;
  } catch (err) {
    console.error('[FitPro] Erro no RPC finish_workout:', err);
    toast('⚠️ Erro ao salvar no servidor. Progresso salvo localmente.');
    return null;
  }
}

// Web Audio alarm
function playAlarm(type='rest'){
  if(!S.sound)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const beep=(f,t,d,vol=0.25)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(vol,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+d);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+d+.05);
    };
    if(type==='rest'){beep(660,.0,.12);beep(880,.18,.12);beep(1100,.36,.22);}
    else if(type==='set'){beep(880,.0,.1);beep(1100,.15,.18);}
    else if(type==='done'){beep(523,.0,.12);beep(659,.16,.12);beep(784,.32,.12);beep(1047,.48,.35);}
    else if(type==='tick'){beep(440,.0,.05,.1);}
    if(navigator.vibrate){
      if(type==='rest')navigator.vibrate([100,50,100,50,200]);
      else if(type==='set')navigator.vibrate([150,80,300]);
      else if(type==='done')navigator.vibrate([200,100,200,100,400]);
    }
  }catch(e){}
}

function startSessionTimer(){

}

function fmtTime(s){const m=Math.floor(s/60);return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}

// ─── REST TIMER ───────────────────────────────────────────
function startRest(sec,nextName=''){
  if(restTimer)stopRest();
  restTotal=sec;restRem=sec;
  document.getElementById('rest-label-top').textContent='Descansando';
  document.getElementById('rest-next-ex').textContent=nextName?`Próximo: ${nextName}`:'';
  updateRestUI();
  document.getElementById('rest-ov').classList.add('open');
  restTimer=setInterval(()=>{
    restRem--;
    if(restRem<=0){stopRest();playAlarm('rest');toast('💪 Hora da próxima série!');}
    else{updateRestUI();if(restRem<=3)playAlarm('tick');}
  },1000);
}
function stopRest(){
  if(restTimer){clearInterval(restTimer);restTimer=null;}
  document.getElementById('rest-ov').classList.remove('open');
}
function addRestTime(n){
  restRem=Math.max(1,restRem+n);
  updateRestUI();
}
function updateRestUI(){
  const pct=restRem/restTotal;
  const offset=CIRC*(1-pct);
  const ring=document.getElementById('rest-ring');
  const num=document.getElementById('rest-num');
  if(ring)ring.setAttribute('stroke-dashoffset',offset);
  if(num)num.textContent=restRem;
  // color: green→yellow→red
  const color=restRem>restTotal*.5?'var(--green)':restRem>restTotal*.25?'var(--yellow)':'var(--red)';
  if(ring)ring.setAttribute('stroke',color);
}

// ─── PER-SET COUNTDOWN ────────────────────────────────────
function startSetTimer(exIdx,setIdx,seconds,name){
  if(!Number.isFinite(seconds)||seconds<1)return;
  if(setTimer)stopSetTimer();
  setTotal=seconds;setRem=seconds;
  pendingExIdx=exIdx;pendingSetIdx=setIdx;
  document.getElementById('set-ov-name').textContent=name;
  updateSetUI();
  document.getElementById('set-ov').classList.add('open');
  setTimer=setInterval(()=>{
    setRem--;
    if(setRem<=0){
      clearInterval(setTimer);setTimer=null;
      document.getElementById('set-ov').classList.remove('open');
      playAlarm('set');
      // Auto-complete the set
      if(S.aw&&pendingExIdx!=null&&pendingSetIdx!=null){
        S.aw.exs[pendingExIdx].sets[pendingSetIdx].done=true;
        const rest=S.aw.exs[pendingExIdx].rest;
        const nextEx=S.aw.exs[pendingExIdx];
        save();
        renderWorkout();
        startRest(rest, nextEx.n);
      }
    }else{
      updateSetUI();
      if(setRem<=3)playAlarm('tick');
    }
  },1000);
}
function stopSetTimer(){
  if(setTimer){clearInterval(setTimer);setTimer=null;}
  document.getElementById('set-ov').classList.remove('open');
}
function skipSetTimer(){
  if(setTimer){clearInterval(setTimer);setTimer=null;}
  document.getElementById('set-ov').classList.remove('open');
  if(S.aw&&pendingExIdx!=null&&pendingSetIdx!=null){
    S.aw.exs[pendingExIdx].sets[pendingSetIdx].done=true;
    const rest=S.aw.exs[pendingExIdx].rest;
    save();
    renderWorkout();
    startRest(rest);
  }
}
function startSetTimerFor(ei,si){
  if(!S.aw||!S.aw.exs[ei]||!S.aw.exs[ei].sets[si])return;
  const e=S.aw.exs[ei],st=e.sets[si];
  if(st.done)return;
  const secs=Math.round(Number(st.reps));
  if(!Number.isFinite(secs)||secs<1){toast('⚠️ Defina o tempo da série em segundos');return;}
  startSetTimer(ei,si,secs,e.n);
}
function updateSetUI(){
  const pct=setRem/setTotal;
  const offset=CIRC*(1-pct);
  const ring=document.getElementById('set-ring');
  const num=document.getElementById('set-num');
  if(ring)ring.setAttribute('stroke-dashoffset',offset);
  if(num)num.textContent=setRem;
}

function getLvl(xp){
  const th=[0,500,1000,1800,2800,4200,6000,8500,11500,15000,20000];
  let lv=1;for(let i=0;i<th.length;i++){if(xp>=th[i])lv=i+1;}
  return{lv,prev:th[lv-1]||0,next:th[Math.min(lv,th.length-1)]||99999};
}

  try{

      console.warn('FitPro: falha ao salvar estado',e2);
    }
  }
}

// Valida e normaliza o estado vindo do armazenamento.
// Estado corrompido ou adulterado nunca deve derrubar o app nem injetar HTML.
function sanitizeState(p){
  if(!p||typeof p!=='object')return{};
  const num=(v,d,min,max)=>{const x=Number(v);return Number.isFinite(x)?Math.min(max,Math.max(min,x)):d;};
  const str=(v,d)=>typeof v==='string'?v.slice(0,120):d;
  const o={};
  o.xp=num(p.xp,0,0,1e9);
  o.txp=num(p.txp,0,0,1e9);
  o.level=1;
  o.streak=num(p.streak,0,0,1e6);
  o.tw=num(p.tw,0,0,1e6);
  o.te=num(p.te,0,0,1e7);
  o.lastDate=str(p.lastDate,null);
  o.ach=Array.isArray(p.ach)?p.ach.filter(x=>typeof x==='string').slice(0,100):[];
  o.weight=num(p.weight,75,30,300);
  o.height=num(p.height,175,100,250);
  o.age=num(p.age,25,10,100);
  o.goal=['perder','manter','ganhar'].includes(p.goal)?p.goal:'manter';
  o.history=Array.isArray(p.history)?p.history.slice(-50).filter(h=>h&&typeof h==='object').map(h=>({date:str(h.date,''),exs:num(h.exs,0,0,99),dur:num(h.dur,1,1,9999),xp:num(h.xp,0,0,99999),tmpl:h.tmpl==null?null:str(h.tmpl,null)})):[];
  o.weightLog=Array.isArray(p.weightLog)?p.weightLog.slice(-30).filter(x=>x&&typeof x==='object').map(x=>({v:num(x.v,75,30,300),d:str(x.d,'')})):[];
  o.water=num(p.water,0,0,99);
  o.waterGoal=num(p.waterGoal,8,1,30);
  o.waterDays=num(p.waterDays,0,0,99999);
  o.lastWaterDate=str(p.lastWaterDate,null);
  o.lastWaterGoalDate=str(p.lastWaterGoalDate,null);
  o.sound=p.sound!==false;
  o.earlyBird=!!p.earlyBird;
  o.aw=null;
  if(p.aw&&typeof p.aw==='object'&&Array.isArray(p.aw.exs)){
    // Reconstrói o treino ativo a partir do catálogo EX (constante):
    // nome, descrição e ícone nunca vêm do storage.
    const exs=p.aw.exs.map(e=>{
      const base=e&&EX.find(x=>x.id===e.id);
      if(!base)return null;
      const sets=(Array.isArray(e.sets)?e.sets:[]).slice(0,20).map((st,i)=>({num:i+1,reps:num(st&&st.reps,base.reps,0,9999),weight:num(st&&st.weight,0,0,9999),done:!!(st&&st.done)}));
      return sets.length?{...base,sets}:null;
    }).filter(Boolean);
    if(exs.length)o.aw={exs,start:num(p.aw.start,Date.now(),0,8.64e15),name:str(p.aw.name,'Treino Livre')||'Treino Livre'};
  }
  return o;
}
async function load(){
  let r=null;
  try{
    if(window.storage){const x=await window.storage.get('fp2');if(x)r=x.value;}
  }catch(e){/* chave inexistente ou storage indisponível */}
  try{if(!r)r=localStorage.getItem('fp2');}catch(e){}
  if(!r)return;
  try{S={...S,...sanitizeState(JSON.parse(r))};}
  catch(e){console.warn('FitPro: estado salvo inválido; usando padrão.',e);}
}

function addWater(n){
  const today=new Date().toDateString();
  if(S.lastWaterDate!==today){S.water=0;S.lastWaterDate=today;}
  S.water=Math.max(0,Math.min(S.waterGoal+2,S.water+n));
  if(S.water>=S.waterGoal&&S.lastWaterGoalDate!==today){
    S.lastWaterGoalDate=today;
    S.waterDays=(S.waterDays||0)+1;
    checkAch(0);
  }
  save();renderHome();
}
function setWater(n){
  const today=new Date().toDateString();
  if(S.lastWaterDate!==today)S.water=0;
  S.lastWaterDate=today;
  S.water=Math.max(0,Math.min(S.waterGoal+2,Math.round(Number(n))||0));
  if(S.water>=S.waterGoal&&S.lastWaterGoalDate!==today){
    S.lastWaterGoalDate=today;
    S.waterDays=(S.waterDays||0)+1;
    checkAch(0);
  }
  save();renderHome();
}

function loadTemplate(tid){
  const t=TEMPLATES.find(x=>x.id===tid);
  if(!t)return;
  S.aw={exs:[],start:Date.now(),name:t.name};
  t.ids.forEach(id=>{
    const e=EX.find(x=>x.id===id);
    if(e)S.aw.exs.push({...e,sets:Array.from({length:e.sets},(_,i)=>({num:i+1,reps:e.reps,weight:0,done:false}))});
  });
  toast(`📋 ${t.name} carregado!`);
  workoutTab='active';
  save();
  renderWorkout();
}

function updSet(ei,si,field,v){
  if(!S.aw||!S.aw.exs[ei]||!S.aw.exs[ei].sets[si])return;
  let n=parseFloat(v);
  if(!Number.isFinite(n))n=0;
  n=Math.max(0,Math.min(9999,n));
  if(field==='reps')n=Math.round(n);
  S.aw.exs[ei].sets[si][field]=n;
  saveDebounced();
}
function doneSet(ei,si){
  if(!S.aw||!S.aw.exs[ei]||!S.aw.exs[ei].sets[si])return;
  const st=S.aw.exs[ei].sets[si];
  if(!st.reps||st.reps<1){toast('⚠️ Informe as repetições antes de concluir');return;}
  st.done=true;
  const e=S.aw.exs[ei];
  const nextUndone=S.aw.exs.find(x=>x.sets.some(s=>!s.done));
  save();
  renderWorkout();
  startRest(e.rest, nextUndone?nextUndone.n:'');
}
function undoSet(ei,si){if(S.aw)S.aw.exs[ei].sets[si].done=false;save();renderWorkout();}
function rmExFromW(ei){
  if(S.aw)S.aw.exs.splice(ei,1);
  if(S.aw&&S.aw.exs.length===0){S.aw=null;stopSessionTimer();}
  save();
  renderWorkout();
}

function finishW(){
  if(!S.aw)return;
  const w=S.aw;
  const done=w.exs.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
  if(done===0){toast('⚠️ Complete pelo menos 1 série!');return;}

  // Tenta usar o RPC seguro do Supabase primeiro (se logado)
  if (currentUser && isSupabaseReady) {
    // Nota: Aqui precisaríamos criar o workout no Supabase antes.
    // Por enquanto, executamos a lógica local + RPC (o backend recalcula tudo de forma segura)
    finishWorkoutViaSupabase(w.id || 'local').then(rpcResult => {
      if (rpcResult && rpcResult.ok) {
        // Se RPC retornou dados, podemos atualizar o estado local com os valores do servidor
        console.log('[FitPro] Progresso sincronizado via Supabase RPC');
      }
    }).catch(() => {});
  }
  const xpE=w.exs.reduce((a,e)=>{
    const ds=e.sets.filter(s=>s.done).length;
    return a+Math.round(e.xp*(ds/e.sets.length));
  },0)+50;
  const dur=Math.max(1,Math.round((Date.now()-w.start)/60000));
  const today=new Date();
  const todayStr=today.toDateString();
  if(today.getHours()<9)S.earlyBird=true;
  S.xp+=xpE;S.txp+=xpE;S.tw++;S.te+=w.exs.filter(e=>e.sets.some(s=>s.done)).length;
  if(S.lastDate!==todayStr){
    const yd=new Date(today);yd.setDate(yd.getDate()-1);const yest=yd.toDateString();
    S.streak=S.lastDate===yest?S.streak+1:1;
    S.lastDate=todayStr;
  }
  S.history.push({date:today.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}),exs:w.exs.length,dur,xp:xpE,tmpl:w.name!=='Treino Livre'?w.name:null});
  const elapsed=sessionSec;
  S.aw=null;
  stopSessionTimer();stopRest();stopSetTimer();
  checkAch(xpE);save();
  const lvl=getLvl(S.xp);
  document.getElementById('sc-workout').innerHTML=`
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;gap:14px">
    <div style="font-size:70px" class="pop">🏆</div>
    <div style="font-family:var(--font-h);font-size:32px;font-weight:800">Treino Concluído!</div>
    <div style="background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.3);border-radius:16px;padding:16px 24px">
      <div style="font-family:var(--font-h);font-size:52px;font-weight:800;color:var(--accent)">+${xpE}</div>
      <div style="font-size:13px;color:var(--text2)">XP · ${w.exs.length} exercícios · ${dur}min · ${fmtTime(elapsed||dur*60)}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%">
      <div class="card-xs" style="text-align:center"><div style="font-family:var(--font-h);font-size:22px;font-weight:800;color:var(--accent)">Nv ${lvl.lv}</div><div style="font-size:10px;color:var(--text2)">Nível</div></div>
      <div class="card-xs" style="text-align:center"><div style="font-family:var(--font-h);font-size:22px;font-weight:800;color:var(--green)">🔥${S.streak}</div><div style="font-size:10px;color:var(--text2)">Sequência</div></div>
      <div class="card-xs" style="text-align:center"><div style="font-family:var(--font-h);font-size:22px;font-weight:800;color:var(--blue)">${S.tw}</div><div style="font-size:10px;color:var(--text2)">Treinos</div></div>
    </div>
    <button class="btn btn-p" style="max-width:280px;margin-top:6px" onclick="nav('home')">Voltar ao Início</button>

// ─── ACHIEVEMENTS ─────────────────────────────────────────
function checkAch(bonusXp){
  let got=[];
  ACHIEVEMENTS.forEach(a=>{
    if(!S.ach.includes(a.id)&&a.check(S)){

// ─── NUTRITION ────────────────────────────────────────────
function updBody(k,el,min,max){
  let v=parseFloat(el.value);
  if(!Number.isFinite(v))v=S[k];
  v=Math.min(max,Math.max(min,v));
  S[k]=v;
  save();
  renderNutrition();
}
function renderNutrition(){
  const sc=document.getElementById('sc-nutrition');
  const {weight:w=75,height:h=175,age:a=25,goal:g='manter'}=S;
  const bmr=Math.round(10*w+6.25*h-5*a+5);
  const tdee=Math.round(bmr*1.4);
  const goals={
    perder:{cal:tdee-400,p:Math.round(w*2.2),c:0,f:Math.round(w*.8)},
    manter:{cal:tdee,p:Math.round(w*1.8),c:0,f:Math.round(w*1)},
    ganhar:{cal:tdee+300,p:Math.round(w*2.4),c:0,f:Math.round(w*1.2)},
  };
  const m=goals[g];
  m.c=Math.max(0,Math.round((m.cal-m.p*4-m.f*9)/4));
  const pCal=m.p*4,cCal=m.c*4,fCal=m.f*9;
  const tot=pCal+cCal+fCal;
  const bmiV=w/((h/100)**2);
  const bmi=bmiV.toFixed(1);
  const bmiCat=bmiV<18.5?['Abaixo do peso','var(--blue)']:bmiV<25?['Peso normal','var(--green)']:bmiV<30?['Sobrepeso','var(--yellow)']:['Obesidade','var(--red)'];

  sc.innerHTML=`

  <div style="padding:14px;display:flex;flex-direction:column;gap:12px">

    <div class="card">
      <div class="sec-title" style="margin-bottom:12px">Seus Dados</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        ${[['Peso (kg)','weight',w,30,300],['Altura (cm)','height',h,100,250],['Idade','age',a,10,100]].map(([l,k,v,min,max])=>`
        <div>
          <div style="font-size:11px;color:var(--text2);margin-bottom:5px">${l}</div>
          <input class="ninput" type="number" min="${min}" max="${max}" value="${v}" style="width:100%" aria-label="${l}"
            onchange="updBody('${k}',this,${min},${max})"/>
        </div>`).join('')}
        <div>
          <div style="font-size:11px;color:var(--text2);margin-bottom:5px">Objetivo</div>
          <select onchange="S.goal=this.value;save();renderNutrition()" aria-label="Objetivo" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;padding:7px 10px;outline:none;width:100%">
            <option value="perder" ${g==='perder'?'selected':''}>Perder Peso</option>
            <option value="manter" ${g==='manter'?'selected':''}>Manter Peso</option>
            <option value="ganhar" ${g==='ganhar'?'selected':''}>Ganhar Massa</option>
          </select>
        </div>
      </div>
      <div style="background:var(--bg3);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:13px;color:var(--text2)">IMC: <strong style="color:${bmiCat[1]}">${bmi}</strong></div>
        <div style="font-size:12px;color:${bmiCat[1]};font-weight:600">${bmiCat[0]}</div>
        <div style="font-size:12px;color:var(--text2)">TMB: ${bmr} · TDEE: ${tdee}</div>
      </div>
    </div>

    <div class="card" style="border-color:rgba(249,115,22,.25)">
      <div style="text-align:center;margin-bottom:14px">
        <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">Meta Diária</div>
        <div style="font-family:var(--font-h);font-size:52px;font-weight:800;color:var(--accent)">${m.cal}</div>
        <div style="font-size:12px;color:var(--text2)">kcal/dia</div>
      </div>
      ${[
        {l:'Proteína',v:m.p,cal:pCal,pct:Math.round(pCal/tot*100),c:'var(--accent)'},
        {l:'Carboidrato',v:m.c,cal:cCal,pct:Math.round(cCal/tot*100),c:'var(--blue)'},
        {l:'Gordura',v:m.f,cal:fCal,pct:Math.round(fCal/tot*100),c:'var(--purple)'},
      ].map(x=>`
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
          <span style="font-weight:600">${x.l}</span>
          <span style="color:var(--text2)"><strong style="color:${x.c}">${x.v}g</strong> · ${x.cal}kcal · ${x.pct}%</span>
        </div>
        <div class="mbar"><div class="mfill" style="width:${x.pct}%;background:${x.c}"></div></div>
      </div>`).join('')}
    </div>

    <div class="card">
      <div class="sec-title" style="margin-bottom:12px">Plano Alimentar</div>
      ${mealPlan(m.cal,g).map(meal=>`
      <div style="padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <div style="font-weight:600;font-size:14px">${meal.n}</div>
          <div style="font-size:12px;font-weight:700;color:var(--accent)">${meal.cal}kcal</div>

// ─── PROFILE ──────────────────────────────────────────────
function renderProfile(){
  const sc=document.getElementById('sc-profile');
  const {lv,prev,next}=getLvl(S.xp);
  const pct=Math.round((S.xp-prev)/(Math.max(next-prev,1))*100);
  sc.innerHTML=`
  <div class="hdr"><h1>Per<span>fil</span></h1>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;color:var(--text2)">Som</span>
      <div onclick="S.sound=!S.sound;save();renderProfile()" role="switch" tabindex="0" aria-checked="${S.sound}" aria-label="Alertas sonoros" style="width:40px;height:22px;border-radius:11px;background:${S.sound?'var(--accent)':'var(--bg3)'};border:1px solid var(--border);cursor:pointer;position:relative;transition:.2s">
        <div style="width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:${S.sound?'20px':'2px'};transition:.2s"></div>
      </div>
    </div>
  </div>
  <div style="padding:14px;display:flex;flex-direction:column;gap:12px">

    <div class="card" style="background:linear-gradient(135deg,rgba(249,115,22,.1),rgba(251,146,60,.04));border-color:rgba(249,115,22,.25)">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">
        <div style="width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accentd));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px">🧑</div>
        <div style="flex:1">
          <div style="font-family:var(--font-h);font-size:22px;font-weight:800">Atleta FitPro</div>
          <div style="display:flex;gap:8px;margin-top:4px;align-items:center">
            <div class="lvlbadge">Nível ${lv}</div>
            ${S.streak>0?`<span style="font-size:13px;font-weight:600;color:var(--accent2)">🔥 ${S.streak} dias</span>`:''}
          </div>
          <!-- Status de Autenticação Supabase -->
          <div style="margin-top:6px">
            ${currentUser 
              ? `<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:#22c55e">● Conectado</span> <span style="font-size:11px;color:var(--text2)">${currentUser.email}</span> <button onclick="signOutSupabase()" class="btn btn-s btn-sm" style="padding:2px 8px;font-size:10px">Sair</button></div>`
              : `<button onclick="showLoginModal()" class="btn btn-p btn-sm" style="padding:4px 14px;font-size:12px;width:auto">Entrar / Sincronizar</button>`
            }
          </div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px">
        <span>${S.xp.toLocaleString()} XP</span><span>${next.toLocaleString()} XP</span>
      </div>
      <div class="xpbar" style="height:10px"><div class="xpfill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:var(--text2);text-align:right;margin-top:5px">${(next-S.xp).toLocaleString()} XP para Nível ${lv+1}</div>
    </div>

    <div class="stat-grid">
      <div class="stat-c"><div class="stat-v" style="color:var(--accent)">${S.tw}</div><div class="stat-l">Treinos</div></div>
      <div class="stat-c"><div class="stat-v" style="color:var(--blue)">${S.te}</div><div class="stat-l">Exercícios</div></div>
      <div class="stat-c"><div class="stat-v" style="color:var(--green)">${S.streak}</div><div class="stat-l">Sequência</div></div>
      <div class="stat-c"><div class="stat-v" style="color:var(--purple)">${S.txp.toLocaleString()}</div><div class="stat-l">XP Total</div></div>

    <!-- Weight log -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="sec-title" style="margin:0">Histórico de Peso</div>

          <input class="ninput" type="number" min="30" max="250" step=".1" id="wlog-input" value="${S.weight}" aria-label="Peso em quilos" style="width:60px"/>

        return `<div class="ach${done?'':' locked'}">

    <button class="btn btn-d" style="margin-top:4px" onclick="resetAll()">Redefinir Progresso</button>
  </div>`;

  // Draw weight chart
  if(S.weightLog.length>=2){
    requestAnimationFrame(()=>{
      const canvas=document.getElementById('weight-canvas');
      if(!canvas)return;
      const ctx=canvas.getContext('2d');
      const W=canvas.width,H=canvas.height;
      const _css=getComputedStyle(document.documentElement);
      const _accent=_css.getPropertyValue('--accent').trim()||'#f97316';
      const _textC=_css.getPropertyValue('--text').trim()||'#f5f5f5';
      const vals=S.weightLog.map(x=>x.v);
      const min=Math.min(...vals)-2,max=Math.max(...vals)+2;
      ctx.clearRect(0,0,W,H);
      ctx.strokeStyle='rgba(249,115,22,.3)';
      ctx.lineWidth=1;
      ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle=_accent;ctx.lineWidth=2;
      ctx.beginPath();
      S.weightLog.forEach((pt,i)=>{
        const x=i/(S.weightLog.length-1)*(W-20)+10;
        const y=H-((pt.v-min)/(max-min))*(H-20)-10;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      });
      ctx.stroke();
      S.weightLog.forEach((pt,i)=>{
        const x=i/(S.weightLog.length-1)*(W-20)+10;
        const y=H-((pt.v-min)/(max-min))*(H-20)-10;
        ctx.fillStyle=_accent;
        ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
        if(i===S.weightLog.length-1){
          ctx.fillStyle=_textC;
          ctx.font='bold 11px Barlow';
          ctx.textAlign='right';
          ctx.fillText(pt.v+'kg',x+2,y-8);
        }
      });
    });
  }
}

function logWeight(){
  const inp=document.getElementById('wlog-input');
  const v=parseFloat(inp.value);
  if(!v||v<30||v>250){toast('⚠️ Peso inválido');return;}
  S.weight=v;
  const today=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  S.weightLog.push({v,d:today});
  if(S.weightLog.length>30)S.weightLog=S.weightLog.slice(-30);
  save();renderProfile();
  toast(`✅ ${v}kg registrado!`);
}

function resetAll(){
  if(confirm('Redefinir TODO o progresso? Não pode ser desfeito.')){
    S={xp:0,txp:0,level:1,streak:0,lastDate:null,tw:0,te:0,ach:[],weight:75,height:175,age:25,goal:'manter',history:[],weightLog:[],water:0,waterGoal:8,waterDays:0,lastWaterDate:null,lastWaterGoalDate:null,sound:true,aw:null,earlyBird:false};
    save();renderProfile();toast('🔄 Progresso redefinido.');
  }
}

// ─── INIT ─────────────────────────────────────────────────
(async()=>{
  try{await load();}catch(e){console.warn('FitPro: falha ao carregar estado salvo',e);}
  
  // Inicializa Supabase (Premium Integration)
  const supabaseOk = initSupabase();
  if (supabaseOk) {
    await checkSupabaseSession();
    // Listener para mudanças de auth (login/logout em tempo real)
    if (supabaseClient) {
      supabaseClient.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session?.user) {
          currentUser = session.user;
          toast('✅ Login realizado com sucesso!');
          renderProfile();
        }
        if (event === 'SIGNED_OUT') {
          currentUser = null;
          renderProfile();
        }
      });
    }
  }

  try{renderHome();}catch(e){
    console.error('FitPro: falha na inicialização',e);
    const sc=document.getElementById('sc-home');
    if(sc)sc.innerHTML='<div style="padding:48px 24px;text-align:center;color:var(--text2)">Não foi possível iniciar o app. Recarregue a página.</div>';
  }
})();

// ─── LOGIN MODAL (Adicionado na Integração Supabase) ──────
function showLoginModal() {
  const modalHtml = `
    <div class="modal-ov open" id="login-modal" style="z-index:400">
      <div class="modal" style="max-height:70vh">
        <div class="mhandle"></div>
        <div style="text-align:center;margin-bottom:20px">
          <div style="font-family:var(--font-h);font-size:28px;font-weight:800">Bem-vindo ao <span style="color:var(--accent)">FitPro</span></div>
          <div style="color:var(--text2);font-size:14px;margin-top:6px">Entre para sincronizar seu progresso</div>
        </div>
        
        <div style="margin:20px 0">
          <div style="font-size:13px;color:var(--text2);margin-bottom:8px">Seu e-mail</div>
          <input type="email" id="login-email" placeholder="seu@email.com" 
                 style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;padding:14px 16px;outline:none"
                 onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
        </div>
        
        <button class="btn btn-p" onclick="doMagicLogin()" style="margin-bottom:12px">Enviar Link Mágico</button>
        
        <div style="text-align:center;font-size:12px;color:var(--text2)">
          Sem senha • Link enviado por e-mail • Seguro
        </div>
        
        <button class="btn btn-s" style="margin-top:20px" onclick="closeLoginModal()">Cancelar</button>
      </div>
    </div>`;
  
  // Remove modal anterior se existir
  const old = document.getElementById('login-modal');
  if (old) old.remove();
  
  document.body.insertAdjacentHTML('beforeend', modalHtml);
  
  // Foco no input
  setTimeout(() => {
    const inp = document.getElementById('login-email');
    if (inp) inp.focus();
  }, 300);
}

function closeLoginModal() {
  const m = document.getElementById('login-modal');
  if (m) m.remove();
}

async function doMagicLogin() {
  const emailInput = document.getElementById('login-email');
  if (!emailInput) return;
  
  const email = emailInput.value.trim();
  if (!email || !email.includes('@')) {
    toast('⚠️ Digite um e-mail válido');
    return;
  }
  
  const btns = document.querySelectorAll('#login-modal .btn');
  btns.forEach(b => b.disabled = true);
  
  const result = await signInWithMagicLink(email);
  
  if (result.ok) {
    closeLoginModal();
    // O login será confirmado via onAuthStateChange
  } else {
    btns.forEach(b => b.disabled = false);
  }
}
